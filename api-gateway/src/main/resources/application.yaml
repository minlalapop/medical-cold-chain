server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventory-service-products
              uri: lb://inventory-service
              predicates:
                - Path=/api/products/**

            - id: inventory-service-locations
              uri: lb://inventory-service
              predicates:
                - Path=/api/locations/**

            - id: inventory-service-batches
              uri: lb://inventory-service
              predicates:
                - Path=/api/batches/**

            - id: inventory-service-stock
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: requisition-service
              uri: lb://requisition-service
              predicates:
                - Path=/api/requisitions/**

            - id: temperature-service
              uri: lb://temperature-service
              predicates:
                - Path=/api/temperatures/**

            - id: alert-service
              uri: lb://alert-service
              predicates:
                - Path=/api/alerts/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: audit-trail-service
              uri: lb://audit-trail-service
              predicates:
                - Path=/api/audit-logs/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
